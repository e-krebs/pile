<div class="center left">
  <input type="checkbox" id="pocketEnabled" ng-model="vm.pocketEnabled" ng-change="vm.pocketEnable()" />
  <label for="pocketEnabled">
    <span></span>
    enable pocket
  </label>
</div>

<div class="center left">
  <input type="checkbox" id="instapaperEnabled" ng-model="vm.instapaperEnabled" ng-change="vm.instapaperEnable()" />
  <label for="instapaperEnabled">
    <span></span>
    enable instapaper
  </label>
</div>

<div class="center left">
  <label for="alarmPeriod">background refresh interval (in minutes): </label>
  <input type="number" id="alarmPeriod" ng-model="vm.alarmPeriod" ng-change="vm.saveAlarm()" />
</div>
